<!DOCTYPE html>
<html>
<head>
    <title>IoT Dashboard</title>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
            font-family: Arial;
            color: white;
        }

        /* ⭐ STAR BACKGROUND */
        #stars {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.8;
            animation: twinkle var(--twinkle) infinite ease-in-out,
                       float var(--float) linear infinite;
        }

        @keyframes twinkle {
            0%,100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        @keyframes float {
            from { transform: translateY(0); }
            to { transform: translateY(-100vh); }
        }

        /* 🔥 DASHBOARD BOX */
        .container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            text-align: center;
            background: rgba(0,0,0,0.7);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 25px cyan;
        }

        input {
            padding: 10px;
            margin: 8px;
            width: 220px;
            border-radius: 20px;
            border: none;
            outline: none;
            text-align: center;
        }

        button {
            padding: 10px 20px;
            margin: 10px;
            border-radius: 20px;
            border: none;
            background: cyan;
            cursor: pointer;
            font-weight: bold;
        }

        h2 {
            margin-bottom: 20px;
        }

        #status {
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <!-- ⭐ BACKGROUND -->
    <div id="stars"></div>

    <!-- 🔥 DASHBOARD -->
    <div class="container">
        <h2>🚀 IoT MQTT Dashboard</h2>

        <input id="host" placeholder="Broker Host"><br>
        <input id="port" placeholder="Port"><br>
        <input id="mqttUser" placeholder="Username"><br>
        <input id="password" type="password" placeholder="Password">
        

        <button onclick="connectMQTT()">Connect MQTT</button>
        <button onclick="logout()">Logout</button>

        <div id="status"></div>
    </div>

    <!-- MQTT LIB -->
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

    <script>
        /* ⭐ CREATE STARS */
        function createStars() {
            const container = document.getElementById("stars");

            for (let i = 0; i < 150; i++) {
                let star = document.createElement("div");
                star.className = "star";

                star.style.left = Math.random() * 100 + "%";
                star.style.top = Math.random() * 100 + "%";

                star.style.setProperty("--twinkle", (2 + Math.random() * 3) + "s");
                star.style.setProperty("--float", (20 + Math.random() * 20) + "s");

                let size = Math.random() * 3 + 1;
                star.style.width = size + "px";
                star.style.height = size + "px";

                container.appendChild(star);
            }
        }

        window.onload = createStars;

        /* MQTT */
        let client;

        function connectMQTT() {
            let host = document.getElementById("host").value;
            let port = document.getElementById("port").value;
            let user = document.getElementById("mqttUser").value;
            let pass = document.getElementById("mqttPass").value;

            client = mqtt.connect(`wss://${host}:${port}/mqtt`, {
                username: user,
                password: pass
            });

            client.on("connect", () => {
                document.getElementById("status").innerText = "✅ Connected to MQTT";
            });

            client.on("error", () => {
                document.getElementById("status").innerText = "❌ Connection Failed";
            });
        }

        function logout() {
            window.location.href = "index.html";
        }
    </script>

</body>
</html>
